<com-switch class="wid-gamma__show-all-toggle" [(checked)]="showAllNotes">
  {{ 'gamma.showAllNotes' | translate }}
</com-switch>
<div class="wid-gamma__container wid-gamma__container--notes">
  <com-note-color-presenter class="wid-gamma__component-wrapper" [noteColor]="getNoteColor(0)"
    [isHighlighted]="isChordNote(0)">
    <com-note-presenter class="wid-gamma__note" [noteName]="getNoteName(0)" [scaleStep]="getScaleStep()" />
  </com-note-color-presenter>

  @for(offset of displayedSteps(); track $index) {

  <com-note-color-presenter class="wid-gamma__component-wrapper" [noteColor]="getNoteColor(offset.interval)"
    [isHighlighted]="isChordNote(offset.interval)">
    <com-note-presenter class="wid-gamma__note" [noteName]="getNoteName(offset.interval)"
      [scaleStep]="getScaleStep(offset.interval)" />
  </com-note-color-presenter>
  }
</div>

<div class="wid-gamma__formula">
  <span class="wid-gamma__formula-label">
    {{ 'gamma.formula' | translate }}
  </span>

  <span class="wid-gamma__formula-steps">
    @for(offset of selectedFormulaFormatted(); track $index) {
    <span>
      {{offset}}
    </span>
    }
  </span>
</div>
