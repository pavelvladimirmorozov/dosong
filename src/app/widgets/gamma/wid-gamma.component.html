<div class="wid-gamma__container">
  <com-select class="wid-gamma__select wid-gamma__component_wrapper" [options]="scaleSteepsManager.tonicOptions"
    [selectedValue]="tonicViewValue()"
    (selectedValueChange)="onTonicChange($event)" />

  <com-select class="wid-gamma__select wid-gamma__component_wrapper" [options]="scaleSteepsManager.qualityOptions()"
    [selectedValue]="qualityViewValue()"
    (selectedValueChange)="onQualityChange($event)" />

  <com-select class="wid-gamma__select wid-gamma__component_wrapper"
    [options]="scaleSteepsManager.availableKindOptions()" [selectedValue]="kindViewValue()"
    (selectedValueChange)="onKindChange($event)" />
</div>

<com-switch class="wid-gamma__show-all-toggle" [(checked)]="showAllNotes">
  {{ 'gamma.showAllNotes' | translate }}
</com-switch>
<div class="wid-gamma__container wid-gamma__container--notes">
  <com-note-color-presenter class="wid-gamma__component_wrapper" [noteColor]="getNoteColor(0)"
    [isHighlighted]="isChordNote(0)">
    <com-select class="wid-gamma__select" [options]="scaleSteepsManager.tonicOptions"
      [selectedValue]="tonicViewValue()"
      (selectedValueChange)="onTonicChange($event)">
      <com-note-presenter *comSelectContentSlot="let option" [noteName]="option.name" [scaleStep]="getScaleStep()" />
    </com-select>
  </com-note-color-presenter>

  @for(offset of displayedSteps(); track $index) {

  <com-note-color-presenter class="wid-gamma__component_wrapper" [noteColor]="getNoteColor(offset.interval)"
    [isHighlighted]="isChordNote(offset.interval)">
    <com-note-presenter class="wid-gamma__note" [noteName]="getNoteName(offset.interval)"
      [scaleStep]="getScaleStep(offset.interval)" />
  </com-note-color-presenter>
  }
</div>

<div class="wid-gamma__formula">
  <span class="wid-gamma__formula-label">
    {{ 'gamma.formula' | translate }}
  </span>

  <span class="wid-gamma__formula-steps">
    @for(offset of selectedFormulaFormatted(); track $index) {
    <span>
      {{offset}}
    </span>
    }
  </span>
</div>
