<div class="wid-metronome">

  <div class="wid-metronome-bpm-section">
    <div class="wid-metronome-bpm-display">{{ bpm() }}</div>
    <div class="wid-metronome-bpm-label">BPM</div>
    <div class="wid-metronome-bpm-controls">
      <com-button variant="secondary" (click)="bpm.set(bpm() - 10)" [disabled]="bpm() <= 40">−10</com-button>
      <input type="number" class="wid-metronome-bpm-input" [(ngModel)]="bpm" min="40" max="300">
      <com-button variant="secondary" (click)="bpm.set(bpm() + 10)" [disabled]="bpm() >= 300">+10</com-button>
    </div>
  </div>

  <div class="wid-metronome-control-group">
    <span class="wid-metronome-label">Долей в такте</span>
    <com-select [options]="beatsPerMeasureOptions" [(selectedValue)]="beatsPerMeasure"></com-select>
  </div>

  <div class="wid-metronome-visualizer">
    @for (beat of beatElements(); track $index) {
      <wid-metronome-beat-select
        [isActive]="beat.isActive"
        [selectedBeat]="beat.sound"
        (selectedBeatChange)="updateBeatSound($index, $event)"
        [index]="$index">
      </wid-metronome-beat-select>
    }
  </div>

  <div class="wid-metronome-transport">
    <com-button (click)="startMetronome()" [disabled]="isRunning()">Старт</com-button>
    <com-button (click)="stopMetronome()" [disabled]="!isRunning()">Стоп</com-button>
  </div>

  <div class="wid-metronome-control-group">
    <span class="wid-metronome-label">Громкость</span>
    <div class="wid-metronome-volume-row">
      <input class="wid-metronome-volume-slider" type="range" [(ngModel)]="volume" min="0" max="100">
      <span class="wid-metronome-volume-value">{{ volume() }}%</span>
    </div>
  </div>

</div>
